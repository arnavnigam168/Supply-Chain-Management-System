{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">{{ 'Edit Stock Transaction' if transaction else 'Add Stock Transaction' }}</h1>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" class="row g-3">
            <div class="col-12">
                <label class="form-label">Product *</label>
                <select name="product_id" class="form-select" required>
                    <option value="">-- Select --</option>
                    {% for p in products %}
                        <option value="{{ p.product_id }}" {% if transaction and transaction.product_id == p.product_id %}selected{% endif %}>{{ p.product_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Transaction Type *</label>
                <select name="transaction_type" class="form-select" required>
                    {% set current_type = transaction.transaction_type if transaction else 'IN' %}
                    <option value="IN" {% if current_type == 'IN' %}selected{% endif %}>IN</option>
                    <option value="OUT" {% if current_type == 'OUT' %}selected{% endif %}>OUT</option>
                    <option value="ADJUSTMENT" {% if current_type == 'ADJUSTMENT' %}selected{% endif %}>ADJUSTMENT</option>
                </select>
            </div>
            <div class="col-md-6"><label class="form-label">Quantity *</label><input name="quantity" type="number" min="1" class="form-control" value="{{ transaction.quantity if transaction else 1 }}"></div>
            <div class="col-12"><label class="form-label">Transaction Date</label><input name="transaction_date" type="date" class="form-control" value="{{ transaction.transaction_date if transaction else '' }}"></div>
            <div class="col-12"><button type="submit" class="btn btn-primary">Save</button> <a href="{{ url_for('view_stock_transactions') }}" class="btn btn-secondary">Cancel</a></div>
        </form>
    </div>
</div>
{% endblock %}
