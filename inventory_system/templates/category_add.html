{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">{{ 'Edit Category' if category else 'Add Category' }}</h1>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" class="row g-3">
            <div class="col-12"><label class="form-label">Category Name *</label><input name="category_name" class="form-control" value="{{ category.category_name if category else '' }}" required></div>
            <div class="col-12"><label class="form-label">Description</label><input name="description" class="form-control" value="{{ category.description if category else '' }}"></div>
            <div class="col-12"><button type="submit" class="btn btn-primary">Save</button> <a href="{{ url_for('view_categories') }}" class="btn btn-secondary">Cancel</a></div>
        </form>
    </div>
</div>
{% endblock %}
