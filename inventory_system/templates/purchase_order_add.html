{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">{{ 'Edit Purchase Order' if order else 'Create Purchase Order' }}</h1>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" class="row g-3">
            <div class="col-12">
                <label class="form-label">Supplier</label>
                <select name="supplier_id" class="form-select">
                    <option value="">-- Select --</option>
                    {% for s in suppliers %}
                        <option value="{{ s.supplier_id }}" {% if order and order.supplier_id == s.supplier_id %}selected{% endif %}>{{ s.supplier_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6"><label class="form-label">Order Date</label><input name="order_date" type="date" class="form-control" value="{{ order.order_date if order else '' }}"></div>
            <div class="col-md-6"><label class="form-label">Expected Delivery Date</label><input name="expected_delivery_date" type="date" class="form-control" value="{{ order.expected_delivery_date if order else '' }}"></div>
            <div class="col-12"><label class="form-label">Status</label><input name="status" class="form-control" value="{{ order.status if order else 'Pending' }}"></div>
            <div class="col-12"><button type="submit" class="btn btn-primary">Save</button> <a href="{{ url_for('view_purchase_orders') }}" class="btn btn-secondary">Cancel</a></div>
        </form>
    </div>
</div>
{% endblock %}
