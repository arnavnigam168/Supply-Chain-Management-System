{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">{{ 'Edit Product' if product else 'Add Product' }}</h1>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" class="row g-3">
            <div class="col-12"><label class="form-label">Product Name *</label><input name="product_name" class="form-control" value="{{ product.product_name if product else '' }}" required></div>
            <div class="col-md-6">
                <label class="form-label">Category</label>
                <select name="category_id" class="form-select">
                    <option value="">-- Select --</option>
                    {% for c in categories %}
                        <option value="{{ c.category_id }}" {% if product and product.category_id == c.category_id %}selected{% endif %}>{{ c.category_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Supplier</label>
                <select name="supplier_id" class="form-select">
                    <option value="">-- Select --</option>
                    {% for s in suppliers %}
                        <option value="{{ s.supplier_id }}" {% if product and product.supplier_id == s.supplier_id %}selected{% endif %}>{{ s.supplier_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6"><label class="form-label">Unit Price</label><input name="unit_price" type="number" min="0.01" step="0.01" class="form-control" value="{{ product.unit_price if product and product.unit_price else '' }}"></div>
            <div class="col-md-6"><label class="form-label">Unit Type</label><input name="unit_type" class="form-control" value="{{ product.unit_type if product else '' }}"></div>
            <div class="col-12"><label class="form-label">Description</label><input name="description" class="form-control" value="{{ product.description if product else '' }}"></div>
            <div class="col-12"><button type="submit" class="btn btn-primary">Save</button> <a href="{{ url_for('view_products') }}" class="btn btn-secondary">Cancel</a></div>
        </form>
    </div>
</div>
{% endblock %}
