{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">{{ 'Edit Supplier' if supplier else 'Add Supplier' }}</h1>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" class="row g-3">
            <div class="col-12"><label class="form-label">Supplier Name *</label><input name="supplier_name" class="form-control" value="{{ supplier.supplier_name if supplier else '' }}" required></div>
            <div class="col-md-6"><label class="form-label">Contact Person</label><input name="contact_person" class="form-control" value="{{ supplier.contact_person if supplier else '' }}"></div>
            <div class="col-md-6"><label class="form-label">Phone *</label><input name="phone" class="form-control" value="{{ supplier.phone if supplier else '' }}" required></div>
            <div class="col-12"><label class="form-label">Email</label><input name="email" type="email" class="form-control" value="{{ supplier.email if supplier else '' }}"></div>
            <div class="col-12"><label class="form-label">Address</label><input name="address" class="form-control" value="{{ supplier.address if supplier else '' }}"></div>
            <div class="col-md-6"><label class="form-label">City</label><input name="city" class="form-control" value="{{ supplier.city if supplier else '' }}"></div>
            <div class="col-md-6"><label class="form-label">State</label><input name="state" class="form-control" value="{{ supplier.state if supplier else '' }}"></div>
            <div class="col-12"><button type="submit" class="btn btn-primary">Save</button> <a href="{{ url_for('view_suppliers') }}" class="btn btn-secondary">Cancel</a></div>
        </form>
    </div>
</div>
{% endblock %}
