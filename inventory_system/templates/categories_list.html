{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Categories</h1>
    <a href="{{ url_for('add_category') }}" class="btn btn-primary">Add Category</a>
</div>
<div class="card border-0 shadow-sm">
    <div class="table-responsive">
        <table class="table table-striped table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                    <th>Description</th>
                    <th class="text-end">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for c in categories %}
                <tr>
                    <td>{{ c.category_id }}</td>
                    <td>{{ c.category_name }}</td>
                    <td>{{ c.description or '-' }}</td>
                    <td class="text-end">
                        <a href="{{ url_for('edit_category', category_id=c.category_id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <form method="post" action="{{ url_for('delete_category', category_id=c.category_id) }}" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this category?')">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center py-3">No categories found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
